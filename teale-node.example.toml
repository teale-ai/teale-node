# teale-node — Cross-platform TealeNet supply node configuration
# Copy this file to teale-node.toml and customize.

# Inference backend: "llama" (default) or "mnn"
# backend = "llama"

[relay]
url = "wss://relay.teale.com/ws"

[llama]
# Path to llama-server binary
binary = "/usr/local/bin/llama-server"
# Path to GGUF model file
model = "/models/qwen3-8b-q4_k_m.gguf"
# Number of GPU layers to offload (999 = all)
gpu_layers = 999
# Context window size
context_size = 8192
# Local port for llama-server HTTP API
port = 11436
# Extra arguments to pass to llama-server
# extra_args = ["--flash-attn", "--threads", "8"]

[node]
display_name = "Linux GPU Server"
# GPU backend override (auto-detected if omitted): metal, cuda, rocm, vulkan, cpu
# gpu_backend = "cuda"
# Discrete GPU VRAM in GB (omit for unified memory systems like Apple Silicon)
# gpu_vram_gb = 24.0

# ── Android (Termux) Example ──────────────────────────────────────────
# For Google Pixel 9 Pro Fold or similar Android devices running Termux:
#
# [llama]
# binary = "/data/data/com.termux/files/usr/bin/llama-server"
# model = "/storage/emulated/0/models/qwen3-4b-q4_k_m.gguf"
# gpu_layers = 999
# context_size = 2048
# port = 11436
# extra_args = ["--threads", "4"]
#
# [node]
# display_name = "Pixel 9 Pro Fold"
# gpu_backend = "vulkan"
#
# Recommended models for 16GB Android devices:
#   Qwen3 4B Q4_K_M  (~2.5 GB) — best balance of speed and quality
#   Qwen3 8B Q4_K_M  (~4.5 GB) — higher quality, slower
#   Phi-3.5 Mini Q4   (~2.2 GB) — fast, good for chat
#
# Recommended settings:
#   context_size: 2048 (safe) or 4096 (if model fits comfortably)
#   gpu_layers:   999 (Vulkan offloads all layers on Mali-G715)
#   threads:      4 (matches big core count on Tensor G4)
#
# Environment variable overrides (if auto-detection fails):
#   TEALE_CHIP_FAMILY=tensorG4 TEALE_CHIP_NAME="Google Tensor G4" teale-node ...

# ── MNN-LLM Backend (Huawei / Mali GPU devices) ──────────────────────
# For Huawei phones (Kirin SoC) or other devices where OpenCL is faster
# than Vulkan. Set backend = "mnn" at the top of this file.
#
# backend = "mnn"
#
# [mnn]
# binary = "/data/data/com.termux/files/usr/bin/mnn_llm"
# model_dir = "/storage/emulated/0/models/qwen3-0.6b-mnn"
# model_id = "qwen3-0.6b"
# backend_type = "opencl"
# context_size = 2048
# port = 11437
# # extra_args = ["--thread_num", "4"]
#
# [node]
# display_name = "Huawei Mate 60 Pro"
# gpu_backend = "opencl"
#
# MNN model conversion (from Hugging Face):
#   python3 MNN/transformers/llm/export/llm_export.py \
#     --model Qwen/Qwen3-0.6B --quant_bit 4 --output_dir ./qwen3-0.6b-mnn
#
# Recommended models for constrained Android devices:
#   2-4 GB RAM: Qwen3 0.6B Q4  (~400 MB) — fast tool-calling
#   4-8 GB RAM: Qwen3 1.7B Q4  (~1.1 GB) — best sub-4B quality
#   8-12 GB RAM: Qwen3 1.7B Q8 (~1.9 GB) — highest reliability
